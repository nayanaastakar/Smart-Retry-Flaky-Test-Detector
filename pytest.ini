[pytest]
# Pytest Configuration File for Smart Retry & Flaky Test Detector

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Test paths
testpaths = tests

# Output options
addopts = 
    -v
    --strict-markers
    --tb=short
    --disable-warnings
    --html=reports/pytest_report.html
    --self-contained-html

# Markers for test categorization
markers =
    smoke: Tests for critical functionality
    regression: Tests for regression testing
    flaky: Tests that are intentionally flaky
    login: Tests related to login functionality
    search: Tests related to search functionality
    checkout: Tests related to checkout functionality

# Logging configuration
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

log_file = logs/pytest_execution.log
log_file_level = DEBUG
log_file_format = %(asctime)s [%(levelname)8s] %(name)s: %(message)s
log_file_date_format = %Y-%m-%d %H:%M:%S

# Timeout configuration (if pytest-timeout is installed)
timeout = 300

# Coverage configuration (if pytest-cov is installed)
[coverage:run]
source = .
omit = 
    */tests/*
    */venv/*
    */__pycache__/*
    */site-packages/*

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.:
